<?xml version="1.0" encoding="UTF-8"?>
<!-- STRATUM: standoff hold-point marker. Inverted teardrop pin whose tip anchors on
     the standoff coordinate; crimson body matches the surveillance circle theme. The
     head carries an observation crosshair / target glyph for tactical legibility. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 62" width="48" height="62">
  <defs>
    <filter id="ds" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="1.2" stdDeviation="1.2" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Pin body: rounded head blending to a point at bottom-center (24,60). -->
  <path d="M24 60
           C 18 46, 7 39, 7 22
           A 17 17 0 1 1 41 22
           C 41 39, 30 46, 24 60 Z"
        fill="#2A2A2E" stroke="#D11A35" stroke-width="2.6"
        stroke-linejoin="round" filter="url(#ds)"/>

  <!-- Observation crosshair / target glyph centred in the head (24,22). -->
  <circle cx="24" cy="22" r="9.5" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <circle cx="24" cy="22" r="2.6" fill="#D11A35"/>
  <line x1="24" y1="8.5"  x2="24" y2="14.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="29.5" x2="24" y2="35.5" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="10.5" y1="22" x2="16.5" y2="22" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="31.5" y1="22" x2="37.5" y2="22" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
</svg>
